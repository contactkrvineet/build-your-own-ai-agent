version: "3.9"

# =============================================================================
# AskVineet — Docker Compose
# Services: API (FastAPI) + UI (Streamlit)
#
# Usage:
#   docker compose up --build
#   docker compose up api         # API only
#   docker compose up ui          # UI only
# =============================================================================

services:

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: askvineet-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    volumes:
      # Persist vector store and logs between restarts
      - ./data:/app/data
      # Mount documents folder for hot-reload
      - ./documents:/app/documents
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --workers 1
      --log-level info

  # ── Streamlit UI ─────────────────────────────────────────────────────────────
  ui:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: askvineet-ui
    restart: unless-stopped
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    depends_on:
      api:
        condition: service_healthy
    command: >
      streamlit run ui/streamlit_app.py
      --server.port 8501
      --server.address 0.0.0.0
      --server.headless true
      --browser.gatherUsageStats false

volumes:
  data:
