# pytest configuration

[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
markers =
    live: Tests that require a real LLM API key (deselect with -m "not live")
    slow: Tests that are intentionally slow
