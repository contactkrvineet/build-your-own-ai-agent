# =============================================================================
# AskVineet — CI/CD Pipeline
# Triggers: push to main, manual dispatch
#
# Jobs:
#   1. test    — lint + unit tests (no secrets needed)
#   2. build   — Docker image → push to GitHub Container Registry
#   3. deploy  — Trigger Render.com deploy via deploy hooks
#
# Required GitHub Secrets:
#   GROQ_API_KEY              — LLM provider key (or whichever provider you use)
#   RENDER_DEPLOY_HOOK_API    — Render deploy hook URL for API service
#
# Optional GitHub Secrets (only if features are enabled):
#   RENDER_DEPLOY_HOOK_UI     — Render deploy hook URL for UI service
#   SECRET_KEY
#   OPENAI_API_KEY
#   ANTHROPIC_API_KEY
#   GOOGLE_API_KEY
#   HUGGINGFACE_API_TOKEN
#   OPENWEATHERMAP_API_KEY
#   CUSTOM_API_KEY
#   LANGCHAIN_API_KEY
#
# Non-secret Variables (set in GitHub → Settings → Variables → Actions):
#   LLM_PROVIDER              — e.g. groq (default: groq)
#   LLM_MODEL                 — e.g. llama3-8b-8192 (default: llama3-8b-8192)
#   APP_ENV                   — e.g. production (default: production)
# =============================================================================

name: CI/CD — Test, Build, Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "Deploy target environment"
        required: false
        default: "production"
        type: choice
        options:
          - production
          - staging

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Opt into Node.js 24 to silence deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PYTHON_VERSION: "3.11"

jobs:
  # ===========================================================================
  # Job 1: Test — Lint + Unit Tests
  # ===========================================================================
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends tesseract-ocr poppler-utils

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          pytest tests/ -v -m "not live" --tb=short --junitxml=test-results.xml
        env:
          # Minimal env so settings.py doesn't fail — no real keys needed for mocked tests
          APP_ENV: test
          GROQ_API_KEY: "test-key-not-real"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: test-results.xml

  # ===========================================================================
  # Job 2: Build — Docker image → GitHub Container Registry
  # ===========================================================================
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build-push.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        id: build-push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=min
          target: runtime

  # ===========================================================================
  # Job 3: Deploy — Trigger Render.com deploy
  # ===========================================================================
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 10
    environment: production

    steps:
      - name: Trigger Render deploy — API service
        run: |
          curl -sf "${{ secrets.RENDER_DEPLOY_HOOK_API }}" \
            || { echo "❌ Failed to trigger API deploy. Is RENDER_DEPLOY_HOOK_API secret set?"; exit 1; }
          echo "✅ API deploy triggered"

      - name: Trigger Render deploy — UI service (optional)
        if: ${{ secrets.RENDER_DEPLOY_HOOK_UI != '' }}
        run: |
          curl -sf "${{ secrets.RENDER_DEPLOY_HOOK_UI }}" \
            || { echo "⚠️ UI deploy hook failed (non-fatal)"; }
          echo "✅ UI deploy triggered"
