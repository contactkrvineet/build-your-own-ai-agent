name: "Portfolio Showcase Pipeline"

trigger:
  type: manual # manual | scheduled | file_event

steps:
  - action: query_agent
    input: "Summarise Vineet Kumar's key skills and experience in 3 bullet points."

  - action: log
    message: "Agent summary complete. Logging result."

  - action: query_agent
    input: "Based on the previous summary, what roles would suit Vineet best? List 3."

  - action: log
    message: "Pipeline finished successfully."
